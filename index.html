<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreativoAds</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.lang span {
  margin-left:10px;
  cursor:pointer;
  opacity:0.6;
}
.lang span:hover {opacity:1}

/* HERO */
.hero {
  text-align:center;
  margin-top:50px;
}

.hero img {
  width:260px;
  border-radius:20px;
  animation: float 4s infinite;
}

@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.hero h1 {
  font-size:38px;
  margin-top:20px;
}

.btn {
  margin-top:20px;
  display:inline-block;
  padding:12px 25px;
  background:#00c6ff;
  border-radius:30px;
  text-decoration:none;
  color:white;
  transition:.3s;
}
.btn:hover {transform:scale(1.1)}

/* SERVICES */
.services {
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:60px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  width:250px;
  border-radius:15px;
  text-align:center;
  transition:.3s;
}
.card:hover {
  transform:translateY(-10px);
  background:rgba(255,255,255,0.1);
}

/* CONTACT */
.contact {
  text-align:center;
  margin-top:60px;
}

.contact a {
  color:#00d4ff;
  text-decoration:none;
}

/* FLOAT TELEGRAM */
.telegram-float {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0088cc;
  color:white;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
  font-size:20px;
}
</style>
</head>

<body>

<header>
  <div>CreativoAds</div>
  <div class="lang">
    <span onclick="setLang('en')">EN</span>
    <span onclick="setLang('uz')">UZ</span>
    <span onclick="setLang('ru')">RU</span>
  </div>
</header>

<section class="hero">
  <img src="https://images.unsplash.com/photo-1551434678-e076c223a692">

  <h1 id="title">We Turn Your Brand Into Profit 🚀</h1>
  <p id="desc">High converting landing pages and ads</p>

  <a href="#contact" class="btn" id="btn">Contact</a>
</section>

<section class="services">
  <div class="card">
    <h3 id="s1">Landing Page</h3>
    <p id="s1d">Modern websites</p>
  </div>

  <div class="card">
    <h3 id="s2">Advertising</h3>
    <p id="s2d">Creative ads</p>
  </div>

  <div class="card">
    <h3 id="s3">Branding</h3>
    <p id="s3d">Business identity</p>
  </div>
</section>

<section class="contact" id="contact">
  <h2 id="contactTitle">Contact</h2>

  <p>
    📲 
    <a href="https://t.me/creativoads" target="_blank">
      @creativoads
    </a>
  </p>

  <p>
    📞 
    <a href="tel:+998701651406">
      +998 70 165 14 06
    </a>
  </p>
</section>

<footer style="text-align:center;margin-top:40px;opacity:.6;">
© 2026 CreativoAds
</footer>

<!-- FLOAT BUTTON -->
<a href="https://t.me/creativoads" target="_blank" class="telegram-float">
💬
</a>

<script>
function setLang(lang) {
const data = {
  uz:{
    title:"Biz brendingizni daromadga aylantiramiz 🚀",
    desc:"Kuchli landing page va reklama",
    btn:"Bog‘lanish",
    s1:"Landing sahifa",
    s1d:"Zamonaviy saytlar",
    s2:"Reklama",
    s2d:"SMM va target",
    s3:"Brending",
    s3d:"Logo va dizayn",
    contact:"Bog‘lanish"
  },
  ru:{
    title:"Мы превращаем ваш бренд в прибыль 🚀",
    desc:"Эффективные сайты и реклама",
    btn:"Связаться",
    s1:"Лендинг",
    s1d:"Современные сайты",
    s2:"Реклама",
    s2d:"SMM и таргет",
    s3:"Брендинг",
    s3d:"Дизайн и логотип",
    contact:"Контакты"
  },
  en:{
    title:"We Turn Your Brand Into Profit 🚀",
    desc:"High converting landing pages and ads",
    btn:"Contact",
    s1:"Landing Page",
    s1d:"Modern websites",
    s2:"Advertising",
    s2d:"Creative ads",
    s3:"Branding",
    s3d:"Business identity",
    contact:"Contact"
  }
};

const t = data[lang];

document.getElementById("title").innerText = t.title;
document.getElementById("desc").innerText = t.desc;
document.getElementById("btn").innerText = t.btn;

document.getElementById("s1").innerText = t.s1;
document.getElementById("s1d").innerText = t.s1d;

document.getElementById("s2").innerText = t.s2;
document.getElementById("s2d").innerText = t.s2d;

document.getElementById("s3").innerText = t.s3;
document.getElementById("s3d").innerText = t.s3d;

document.getElementById("contactTitle").innerText = t.contact;
}
</script>

</body>
</html>
